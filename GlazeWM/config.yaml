general:
  startup_commands: ["shell-exec gat-gwm", "focus --workspace 1"]
  shutdown_commands: ["shell-exec taskkill /IM gat-gwm.exe /F"]
  config_reload_commands: ["focus --workspace 1"]
  focus_follows_cursor: false
  toggle_workspace_on_refocus: false
  cursor_jump:
    enabled: false
    trigger: 'monitor_focus'
  hide_method: 'cloak'
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  inner_gap: "12px"
  outer_gap:
    top: "12px"
    right: "12px"
    bottom: "12px"
    left: "12px"

window_effects:
  focused_window:
    border:
      enabled: false
      color: "#FFFFFF"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "95%"
  other_windows:
    border:
      enabled: false
      color: "#808080"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "0%"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: false
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
    bind_to_monitor: 0
    keep_alive: true
  - name: "2"
    bind_to_monitor: 0
    keep_alive: true
  - name: "3"
    bind_to_monitor: 1
    keep_alive: true
  - name: "4"
    bind_to_monitor: 0
    keep_alive: true
  - name: "5"
    bind_to_monitor: 0
    keep_alive: true
  - name: "6"
    bind_to_monitor: 0
  - name: "7"
    bind_to_monitor: 1
  - name: "8"
    bind_to_monitor: 1
  - name: "9"
    bind_to_monitor: 1

window_rules:
  - commands: ['ignore']
    match:
      - window_process: { equals: 'zebar' }
      - window_title: { regex: '[Pp]icture.in.[Pp]icture' }
        window_class: { regex: 'Chrome_WidgetWin_1|MozillaDialogClass' }
      - window_process: { equals: 'PowerToys' }
        window_class: { regex: 'HwndWrapper\\[PowerToys\\.PowerAccent.*?\\]' }
      - window_title: { equals: 'Command Palette' }
        window_class: { equals: 'WinUIDesktopWin32WindowClass' }
      - window_process: { equals: 'PowerToys' }
        window_title: { regex: '.*? - Peek' }
      - window_process: { equals: 'Lively' }
        window_class: { regex: 'HwndWrapper' }
      - window_process: { equals: 'EXCEL' }
        window_class: { not_regex: 'XLMAIN' }
      - window_process: { equals: 'WINWORD' }
        window_class: { not_regex: 'OpusApp' }
      - window_process: { equals: 'POWERPNT' }
        window_class: { not_regex: 'PPTFrameClass' }
      - window_process: { equals: "Lightshot" }
      - window_process: { equals: "Greenshot" }
      - window_process: { equals: "ShareX" }
        window_title: { regex: "Region capture" }
      - window_process: { equals: "Telegram" }
        window_title: { not_regex: "Telegram" }
      - window_process: { equals: "PickerHost" }

  # Floating-required apps
  - commands: ["set-floating"]
    match:
      - window_process: { regex: "[Ww]in[Ss]py|explorer|qbittorrent|mmc|nvcplui|mpv|vlc|efibooteditor|[Mm]ac[Tt]ray|sine" }
      - window_process: { equals: "GHelper" }
      - window_process: { equals: "SmoothScrollGUI" }
      - window_process: { equals: "Heroic" }
      - window_title: { equals: "Snipping Tool" }
      - window_process: { equals: "BCUninstaller" }
      - window_process: { equals: "Photos" }
      - window_title: { equals: "Windhawk" }
      - window_process: { regex: "[Rr]adeon[Ss]oftware" }
      - window_title: { regex: "Revision Tool|Atlas Toolkit" }
      - window_process: { equals: "FileConverter" }
      - window_process: { equals: "ABDownloadManager" }
      - window_process: { equals: "ShareX" }
      - window_process: { equals: "uad-ng" }
      - window_title: { equals: "LocalSend" }
      - window_process: { regex: "[Nn]otepad*" }
      - window_process: { equals: "zen" }
        window_title: { not_regex: "Zen Browser*" }
      - window_process: { regex: "Flow.Launcher" }
      - window_title: { equals: "Welcome to Flow Launcher" }
      - window_process: { equals: "wish" }
      - window_process: { equals: "ImageGlass" }
      - window_process: { equals: "Everything" }
      - window_process: { equals: "InnoUnpack" }
      - window_process: { equals: "Antigravity" }
        window_title: { not_regex: "Antigravity" }
      - window_process: { equals: "VirtualBox" }
        window_title: { not_regex: "Oracle" }
      - window_process: { regex: "vesktop|equibop" }
        window_title: { not_regex: "Vesktop|Equibop" }
      - window_process: { equals: "obs64" }
        window_title: { not_regex: "OBS" }
      - window_process: { equals: "GoofCord" }
        window_title: { not_equals: "GoofCord" }
      - window_process: { equals: "rundll32" }
        window_title: { equals: "Properties" }
      - window_process: { regex: "Autoruns" }
      - window_title: { includes: "FLOAT" }
      - window_process: { equals: "devenv" }
        window_title: { equals: "Rename" }
      - window_process: { equals: "devenv" }
        window_title: { equals: "Find and Replace" }
      - window_process: { equals: "devenv" }
        window_title: { equals: "Search" }
      - window_process: { equals: "dotPeek64" }
        window_title: { not_regex: "JetBrains" }
      - window_process: { equals: "javaw" }
        window_title: { equals: "New Project" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Select *" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Import *" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Choose *" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Analy*" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "CodeBrowser: *" }
      - window_process: { equals: "javaw" }
        window_title: { equals: "No Program Association" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Decompiler Find Text" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Rename *" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Edit *" }
      - window_process: { equals: "javaw" }
        window_title: { regex: "Save *" }
      - window_process: { equals: 'Photoshop' }
        window_class: { not_regex: 'Photoshop' }
      - window_process: { equals: 'Illustrator' }
        window_class: { not_regex: 'Illustrator' }
      - window_process: { equals: 'AfterFX' }
        window_class: { not_regex: 'AfterFX' }
      - window_process: { equals: 'Adobe Premiere Pro' }
        window_class: { not_regex: 'Premiere Pro' }
      - window_title: { equals: "Task Manager" }
      - window_title: { equals: "App Installer" }
      - window_title: { equals: "Settings" }
      - window_process: { regex: "cmd" }
      - window_process: { regex: "regedit" }
      - window_process: { equals: "mspaint" }
      - window_process: { equals: "ApplicationFrameHost" }
      - window_process: { equals: "Microsoft.Photos" }
      - window_process: { equals: "OptionalFeatures" }
      - window_title: { equals: "DTS:X Ultra" }
      - window_title: { equals: "Character Map UWP" }
      - window_title: { equals: "Fastboot Firmware Flasher" }
      - window_title: { equals: "Realtek Audio Console" }
      - window_title: { equals: "Screenbox" }

  # Tiling Required Apps (for UWP Apps)
  - commands: ["set-tiling"]
    match:
      - window_title: { equals: "WhatsApp" }
      - window_process: { equals: "devenv" }
        window_title: { not_regex: "(Rename|Search|Find and Replace)" }
      - window_process: { equals: "Dorion" }

  # Start apps in their own workspaces (cuz i love seeing them in an instant lol)
  - commands: ["move --workspace 1", "focus --workspace 1"]
    match:
      - window_process: { regex: "zen|chrome|firefox|vivaldi|Arc|librewolf|opera" }
  - commands: ["move --workspace 2", "focus --workspace 2"]
    match:
      - window_process: { regex: "Code|Trae|Cursor|Windsurf|Zed|Antigravity|OpenCode" }
  - commands: ["move --workspace 3", "focus --workspace 3"]
    match:
      - window_process: { regex: "[Ee]quibop|[Dd]iscord|[Vv]esktop|GoofCord|[Ww]ebcord|[Ll]egcord|[Dd]orion" }
      - window_title: { equals: "WhatsApp" }
      - window_title: { equals: "Unigram" }
      - window_title: { equals: "Telegram" }
      - window_title: { equals: "Signal" }
  - commands: ["move --workspace 4", "focus --workspace 4"]
    match:
      - window_process: { equals: "WINWORD" }
      - window_process: { equals: "POWERPNT" }
      - window_process: { regex: "EXCEL" }
      - window_process: { equals: "Notion" }
  - commands: ["move --workspace 5", "focus --workspace 5"]
    match:
      - window_process: { equals: "VirtualBox" }
  - commands: ["move --workspace 6", "focus --workspace 6"]
    match:
      - window_process: { equals: "Riot Client" }
      - window_process: { equals: "gta5" }
      - window_process: { equals: "Heroic" }
      - window_process: { regex: "steam" }
      - window_process: { equals: "PC7" }
  - commands: ["move --workspace 7", "focus --workspace 7"]
    match:
      - window_process: { regex: "Spotify" }
  - commands: ["move --workspace 8", "focus --workspace 8"]
    match:
      - window_title: { equals: "UniGetUI" }
  - commands: ["move --workspace 9", "focus --workspace 9"]
    match:
      - window_process: { regex: "obs64" }

binding_modes:
  - name: 'resize'
    keybindings:
      - commands: ['resize --width -2%']
        bindings: ['left']
      - commands: ['resize --width +2%']
        bindings: ['right']
      - commands: ['resize --height +2%']
        bindings: ['up']
      - commands: ['resize --height -2%']
        bindings: ['down']
      - commands: ['wm-disable-binding-mode --name resize']
        bindings: ['escape', 'enter']
  - name: 'pause'
    keybindings:
      - commands: ['wm-disable-binding-mode --name pause']
        bindings: ['escape', 'enter']
  - name: 'fullscreen'
    keybindings:
      - commands: ['set-tiling', 'wm-disable-binding-mode --name fullscreen']
        bindings: ['alt+f']
      - commands: ['set-floating', 'wm-disable-binding-mode --name fullscreen', 'wm-enable-binding-mode --name floating']
        bindings: ['alt+t']
      - commands: ['set-minimized', 'wm-disable-binding-mode --name fullscreen', 'wm-enable-binding-mode --name minimized']
